<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>92期1隊 半自動勤排系統</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b1420;--card:rgba(16,26,42,.92);--card-l:rgba(24,38,58,.95);
  --primary:#0d1b3e;--primary-l:#1a3a6e;--primary-ll:#2a5298;
  --gold:#d4a843;--gold-l:#e8c96a;--gold-d:#b8922e;
  --text:#e0e6ed;--text-m:#8899aa;--text-d:#556677;
  --border:rgba(255,255,255,.08);--border-l:rgba(255,255,255,.15);
  --cell-empty:rgba(255,255,255,.02);--cell-fill:rgba(42,82,152,.18);
  --cell-hover:rgba(42,82,152,.35);--cell-conflict:rgba(231,76,60,.25);
  --success:#27ae60;--warning:#f39c12;--danger:#e74c3c;--info:#3498db;
  --radius:12px;--shadow:0 8px 32px rgba(0,0,0,.5);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;overflow-x:hidden;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

/* === Custom Scrollbar === */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:rgba(255,255,255,.03);border-radius:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2)}

/* === Header === */
header{background:rgba(13,27,62,.95);backdrop-filter:blur(20px);padding:16px 28px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border-l);display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 20px rgba(0,0,0,.3)}
header h1{font-size:1.45rem;font-weight:700;letter-spacing:.5px;text-shadow:0 1px 8px rgba(212,168,67,.15)}
header h1 em{font-style:normal;color:var(--gold);font-weight:400;font-size:.8em;margin-left:10px}
header .ver{font-size:.75rem;color:var(--text-d);background:rgba(255,255,255,.06);padding:3px 10px;border-radius:20px}

/* === Main Layout === */
main{max-width:1400px;margin:0 auto;padding:24px 16px 80px}

/* === Steps with animation === */
.step{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:28px;opacity:0;transform:translateY(12px);transition:opacity .4s ease,transform .4s ease;display:none}
.step.active{display:block;opacity:1;transform:translateY(0)}
.step.entering{display:block;opacity:0;transform:translateY(12px)}
.step h2{font-size:1.15rem;color:var(--gold);margin-bottom:18px;display:flex;align-items:center;gap:10px}
.step h2 .num{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:var(--primary);width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;box-shadow:0 2px 8px rgba(212,168,67,.3)}
.step h3{font-size:.98rem;color:var(--text);margin:18px 0 12px;font-weight:600}

/* === Drop Zone === */
.drop-zone{border:2px dashed var(--border-l);border-radius:var(--radius);padding:52px 20px;text-align:center;cursor:pointer;transition:all .3s;color:var(--text-m);background:rgba(255,255,255,.01)}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--gold);background:rgba(212,168,67,.06);color:var(--gold);box-shadow:inset 0 0 30px rgba(212,168,67,.05)}
.drop-zone input{display:none}
.drop-zone p{font-size:1.05rem}
.drop-zone .hint{font-size:.82rem;margin-top:10px;opacity:.7}

/* === Import Status === */
.import-ok{margin-top:14px;padding:14px 18px;background:rgba(39,174,96,.1);border:1px solid rgba(39,174,96,.25);border-radius:10px;color:var(--success);font-size:.9rem;animation:fadeSlideIn .4s ease}
.import-err{margin-top:14px;padding:14px 18px;background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.25);border-radius:10px;color:var(--danger);font-size:.9rem;animation:fadeSlideIn .4s ease}

/* === Week Row === */
.week-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:18px}
.week-row label{font-size:.95rem;color:var(--text-m)}
.week-row input[type=number]{width:64px;padding:8px 10px;border:1px solid var(--border-l);border-radius:8px;background:rgba(255,255,255,.06);color:var(--text);font-size:1rem;text-align:center;transition:border-color .2s;-moz-appearance:textfield}
.week-row input[type=number]::-webkit-inner-spin-button,.week-row input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.week-row input[type=number]:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,67,.15)}
.week-row .dates{color:var(--gold);font-weight:600;font-size:.95rem}

/* === Duty Grid === */
.duty-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;margin-bottom:20px}
.duty-card{background:var(--card-l);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:all .25s ease;user-select:none}
.duty-card:hover{border-color:var(--border-l);background:rgba(30,44,65,.98);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.2)}
.duty-card.selected{border-color:var(--gold);background:rgba(212,168,67,.06);box-shadow:0 0 0 1px var(--gold),0 4px 16px rgba(212,168,67,.1)}
.duty-card .dc-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.duty-card .dc-check{width:22px;height:22px;border:2px solid var(--text-d);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .25s ease}
.duty-card.selected .dc-check{background:var(--gold);border-color:var(--gold);color:var(--primary);transform:scale(1.1)}
.duty-card .dc-label{font-weight:600;font-size:.98rem}
.duty-card .dc-detail{font-size:.82rem;color:var(--text-m);margin-top:4px;line-height:1.5}
.duty-card .dc-config{margin-top:12px;display:none;border-top:1px solid var(--border);padding-top:12px;animation:fadeSlideIn .3s ease}
.duty-card.selected .dc-config{display:block}
.dc-config label{font-size:.82rem;color:var(--text-m);display:flex;align-items:center;gap:8px;margin-bottom:6px}
.dc-config input[type=number]{width:52px;padding:5px 8px;border:1px solid var(--border-l);border-radius:6px;background:rgba(255,255,255,.06);color:var(--text);font-size:.88rem;text-align:center;transition:border-color .2s;-moz-appearance:textfield}
.dc-config input[type=number]::-webkit-inner-spin-button,.dc-config input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.dc-config input[type=number]:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,67,.15)}
.dc-config .day-toggles{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.day-tog{padding:6px 12px;border:1px solid var(--border-l);border-radius:6px;font-size:.82rem;cursor:pointer;color:var(--text-m);background:transparent;transition:all .2s ease}
.day-tog:hover{border-color:var(--primary-ll);color:var(--text)}
.day-tog.on{background:var(--primary-ll);border-color:var(--primary-ll);color:#fff;box-shadow:0 2px 8px rgba(42,82,152,.3)}

/* === Summary Bar === */
.summary-bar{background:rgba(42,82,152,.1);border:1px solid rgba(42,82,152,.2);border-radius:10px;padding:14px 18px;margin-bottom:18px;display:flex;gap:24px;flex-wrap:wrap;font-size:.9rem;animation:fadeSlideIn .3s ease}
.summary-bar .sb-item{display:flex;align-items:center;gap:6px}
.summary-bar .sb-num{font-weight:700;font-size:1.1rem}
.sb-ok{color:var(--success)}.sb-warn{color:var(--warning)}.sb-err{color:var(--danger)}

/* === Buttons === */
.btn{padding:12px 28px;border:none;border-radius:10px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s ease;min-height:44px;display:inline-flex;align-items:center;justify-content:center}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.btn:active{transform:translateY(0);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:var(--primary)}.btn-gold:hover{background:linear-gradient(135deg,var(--gold-l),var(--gold));box-shadow:0 4px 20px rgba(212,168,67,.3)}
.btn-blue{background:linear-gradient(135deg,var(--primary-ll),var(--primary-l));color:#fff}.btn-blue:hover{box-shadow:0 4px 20px rgba(42,82,152,.3)}
.btn-outline{background:transparent;border:1.5px solid var(--border-l);color:var(--text-m)}.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-danger-outline{background:transparent;border:1.5px solid rgba(231,76,60,.3);color:var(--text-m)}.btn-danger-outline:hover{border-color:var(--danger);color:var(--danger);background:rgba(231,76,60,.05)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn-row{display:flex;gap:12px;flex-wrap:wrap}
.btn-sm{font-size:.82rem;padding:6px 14px}
.lastweek-upload{margin:10px 0 16px;padding:12px 16px;background:rgba(52,152,219,.08);border:1px solid rgba(52,152,219,.2);border-radius:10px}
.lastweek-label{font-size:.9rem;color:var(--gold);font-weight:500}
.lastweek-row{display:flex;align-items:center;gap:12px;margin-top:8px}
.lastweek-status{font-size:.82rem;color:var(--text-m)}
.lastweek-status.loaded{color:var(--success)}

/* === Tabs === */
.tab-bar{display:flex;gap:4px;border-bottom:2px solid var(--border);margin-bottom:18px;overflow-x:auto;position:relative}
.tab-btn{padding:12px 20px;border:none;background:none;color:var(--text-m);font-size:.92rem;cursor:pointer;white-space:nowrap;position:relative;transition:all .2s ease}
.tab-btn:hover{color:var(--text);background:rgba(255,255,255,.03);border-radius:8px 8px 0 0}
.tab-btn.active{color:var(--gold);font-weight:600}
.tab-btn.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold-l));border-radius:3px 3px 0 0;animation:tabSlideLeft .3s ease;transform-origin:left}
.tab-panel{display:none;animation:fadeIn .3s ease}.tab-panel.active{display:block}

/* === Table (白底黑框正式勤務表) === */
.tbl-wrap{overflow-x:auto;margin-bottom:18px;border-radius:6px;border:2px solid #333;box-shadow:0 4px 20px rgba(0,0,0,.2);background:#fff}
.dtbl{width:100%;border-collapse:collapse;font-size:.86rem;font-family:'微軟正黑體',-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif;color:#111}
.dtbl th{background:#d6dce4;color:#111;padding:10px 8px;font-weight:700;font-size:.9rem;text-align:center;border:1.5px solid #333;position:sticky;top:0;z-index:2}
.dtbl td{border:1px solid #555;padding:0;text-align:center;vertical-align:middle;background:#fff}
.dtbl tbody tr{transition:background .15s ease}
.dtbl tbody tr:hover{background:#eef3fb}
.dtbl .time-cell{background:#f2f2f2;color:#111;font-weight:700;font-size:.82rem;padding:8px 10px;white-space:pre-line;min-width:78px;position:sticky;left:0;z-index:1;border-right:2px solid #333}
.person-cell{padding:8px 6px;min-width:86px;min-height:44px;cursor:pointer;transition:all .15s ease;background:#fff}
.person-cell:hover{background:#dbeafe;box-shadow:inset 0 0 0 2px #3b82f6}
.person-cell.filled{background:#fff}
.person-cell.empty-slot{color:#999;font-size:1.1rem;border:1px dashed #bbb;background:#fafafa;animation:emptyPulse 2.5s ease-in-out infinite}
.pid{font-weight:700;font-size:.9rem;color:#111}
.pname{font-size:.82rem;color:#555;margin-top:1px}
.dtbl .row-group-first td{border-top:2.5px solid #333}
.btn-gold .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(13,27,62,.3);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* === Stats Grid === */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.stat-card{background:var(--card-l);border:1px solid var(--border);border-radius:10px;padding:16px 14px;text-align:center;transition:all .2s ease}
.stat-card:hover{border-color:var(--border-l);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.2)}
.stat-card .sv{font-size:2rem;font-weight:800;color:var(--gold);line-height:1.2}
.stat-card .sl{font-size:.8rem;color:var(--text-m);margin-top:6px}

/* === Hours Dashboard === */
#dashboard h3{border-left:3px solid var(--gold);padding-left:12px}
.hours-chart{margin-top:14px}
.hc-row{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:.82rem;transition:background .15s;border-radius:4px;padding-left:4px;padding-right:4px}
.hc-row:hover{background:rgba(255,255,255,.04)}
.hc-row:nth-child(even){background:rgba(255,255,255,.01)}
.hc-row:nth-child(even):hover{background:rgba(255,255,255,.04)}
.hc-row .hc-name{min-width:100px;text-align:right;color:var(--text-m);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.82rem}
.hc-row .hc-bar-wrap{flex:1;height:20px;background:rgba(255,255,255,.04);border-radius:4px;overflow:hidden}
.hc-row .hc-bar{height:100%;border-radius:4px;transition:width .6s ease-out}
.hc-row .hc-val{min-width:40px;color:var(--text-m);font-weight:500}

/* === Modal with animation === */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;visibility:hidden;transition:opacity .25s ease,visibility .25s ease}
.modal-overlay.show{opacity:1;visibility:visible;overscroll-behavior:contain}
.modal{background:var(--card-l);border:1px solid var(--border-l);border-radius:14px;width:100%;max-width:520px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.05);transform:scale(.92) translateY(10px);transition:transform .25s ease;overflow:hidden}
.modal-overlay.show .modal{transform:scale(1) translateY(0)}
.modal-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:1.05rem;color:var(--gold)}
.modal-head .btn-x{background:none;border:none;color:var(--text-m);font-size:1.4rem;cursor:pointer;padding:4px 8px;border-radius:6px;transition:all .15s}
.modal-head .btn-x:hover{background:rgba(255,255,255,.08);color:var(--text)}
.modal-search{padding:12px 20px;position:relative}
.modal-search::before{content:'';position:absolute;left:32px;top:50%;transform:translateY(-50%);width:16px;height:16px;border:2px solid var(--text-d);border-radius:50%;pointer-events:none}
.modal-search::after{content:'';position:absolute;left:46px;top:50%;transform:translateY(-50%) rotate(45deg);width:6px;height:2px;background:var(--text-d);transform-origin:0 0;pointer-events:none}
.modal-search input{width:100%;padding:11px 16px 11px 42px;border:1px solid var(--border-l);border-radius:8px;background:rgba(255,255,255,.06);color:var(--text);font-size:.9rem;transition:border-color .2s,box-shadow .2s}
.modal-search input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,67,.12)}
.modal-search input::placeholder{color:var(--text-d)}
.picker-list{overflow-y:auto;flex:1;padding:4px 8px 12px;overscroll-behavior:contain}
.pk-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:8px;cursor:pointer;transition:all .15s;border-bottom:1px solid rgba(255,255,255,.04)}
.pk-item:last-child{border-bottom:none}
.pk-item:hover{background:rgba(42,82,152,.2);transform:translateX(2px)}
.pk-id{font-weight:700;min-width:36px;color:var(--gold)}
.pk-name{font-weight:500}
.pk-dept{font-size:.8rem;color:var(--text-m)}
.pk-hrs{margin-left:auto;font-size:.8rem;color:var(--text-m);background:rgba(255,255,255,.05);padding:2px 8px;border-radius:10px}
.pk-hint{padding:8px 14px;color:var(--text-m);font-size:.78rem;text-align:center;border-bottom:1px solid var(--border);margin-bottom:2px}
.pk-clear{padding:12px 14px;color:#fff;background:rgba(231,76,60,.2);cursor:pointer;border-radius:8px;font-size:.92rem;font-weight:500;text-align:center;border:1px solid rgba(231,76,60,.35);margin:0 12px 0;transition:all .15s}
.pk-clear:hover{background:rgba(231,76,60,.35);border-color:rgba(231,76,60,.5)}
.pk-empty{padding:32px 20px;text-align:center;color:var(--text-d);font-size:.9rem}
.pk-empty::before{content:'📭';display:block;font-size:2rem;margin-bottom:8px}
.pk-toggle{display:flex;align-items:center;gap:8px;padding:6px 12px;font-size:.82rem;color:var(--text-m);cursor:pointer;user-select:none}
.pk-toggle input{accent-color:var(--gold);cursor:pointer}
.pk-toggle.auto{color:var(--gold)}
.pk-badge{font-size:.7rem;padding:1px 6px;border-radius:8px;margin-left:4px;font-weight:600}
.pk-badge.busy{background:rgba(231,76,60,.18);color:#e74c3c}
.pk-badge.thisWeek{background:rgba(243,156,18,.18);color:#f39c12}
.pk-badge.lastWeek{background:rgba(52,152,219,.18);color:#3498db}
.pk-badge.gender{background:rgba(155,89,182,.18);color:#9b59b6}
.pk-badge.night{background:rgba(52,73,94,.25);color:#7f8c8d}
.pk-item.forced{opacity:.8;border-left:3px solid var(--gold)}

/* === Toast with animation === */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(39,174,96,.95);color:#fff;padding:12px 28px;border-radius:10px;font-size:.92rem;z-index:300;opacity:0;transition:all .3s ease;pointer-events:none;box-shadow:0 4px 20px rgba(39,174,96,.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* === Animations === */
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes tabSlide{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes tabSlideLeft{from{transform:scaleX(0);transform-origin:left}to{transform:scaleX(1);transform-origin:left}}
@keyframes emptyPulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* === Touch & Scroll Optimization === */
.tbl-wrap,.tab-bar,.picker-list{-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.tbl-outer{position:relative}
.tbl-scroll-hint{display:none}
@media(max-width:600px){
  .tbl-scroll-hint{display:flex;align-items:center;justify-content:center;position:absolute;right:0;top:0;bottom:0;width:36px;pointer-events:none;background:linear-gradient(to right,transparent 0%,rgba(0,0,0,.5) 100%);z-index:3;border-radius:0 6px 6px 0;transition:opacity .3s}
  .tbl-scroll-hint::after{content:'\203A';font-size:1.8rem;color:rgba(255,255,255,.85);animation:hintBounce 1.5s ease-in-out infinite;text-shadow:0 1px 3px rgba(0,0,0,.5)}
  @keyframes hintBounce{0%,100%{transform:translateX(0)}50%{transform:translateX(4px)}}
  .tbl-scroll-hint.hidden{opacity:0}
  .tab-bar{position:relative}
  .tab-bar::after{content:'';position:absolute;right:0;top:0;bottom:2px;width:32px;pointer-events:none;background:linear-gradient(to right,transparent,var(--bg));z-index:1}
}

/* === Responsive === */
@media(max-width:600px){
  /* Header */
  header{padding:10px 14px}
  header h1{font-size:1rem;letter-spacing:0}
  header h1 em{font-size:.7em;margin-left:6px}
  header .ver{font-size:.68rem;padding:2px 8px}

  /* Main layout */
  main{padding:16px 10px 60px}

  /* Steps */
  .step{padding:16px 12px;margin-bottom:16px}
  .step h2{font-size:1.05rem;margin-bottom:14px}
  .step h3{font-size:.92rem;margin:14px 0 10px}

  /* Drop zone — compact for mobile */
  .drop-zone{padding:32px 16px}
  .drop-zone p{font-size:.95rem}

  /* Week row */
  .week-row{gap:10px}
  .week-row label{font-size:.88rem}
  .week-row .dates{font-size:.85rem}
  .week-row input[type=number]{min-height:44px;padding:10px 10px}

  /* Last week upload */
  .lastweek-upload{padding:10px 12px}
  .lastweek-row{flex-wrap:wrap;gap:8px}
  .lastweek-status{font-size:.78rem}

  /* Duty grid — single column */
  .duty-grid{grid-template-columns:1fr;gap:10px}
  .duty-card{padding:14px 12px}
  .duty-card .dc-check{width:26px;height:26px;font-size:1rem}
  .dc-config input[type=number]{min-height:44px;padding:10px 8px}
  .dc-config .day-toggles{gap:4px}
  .day-tog{padding:8px 14px;min-height:44px;display:inline-flex;align-items:center;justify-content:center;font-size:.84rem}

  /* Summary bar */
  .summary-bar{flex-direction:column;gap:8px;padding:12px 14px}

  /* Modal — near full-screen on mobile */

  .modal-search{padding:10px 14px}

  .picker-list{padding:4px 6px 12px}
  .pk-item{padding:14px 12px;gap:10px;min-height:48px}
  .pk-id{min-width:32px;font-size:.85rem}
  .pk-name{font-size:.9rem}
  .pk-dept{font-size:.76rem}
  .pk-hrs{font-size:.76rem}
  .pk-toggle{padding:10px 12px;font-size:.84rem;min-height:44px}
  .pk-clear{padding:14px 12px;font-size:.88rem;min-height:44px}
  .pk-hint{padding:10px 12px;font-size:.8rem}

  /* Toast — avoid bottom nav overlap */
  .toast{bottom:16px;padding:12px 20px;font-size:.88rem;max-width:calc(100vw - 32px)}
}

/* Small phones (iPhone SE, etc.) */
@media(max-width:375px){
  header h1{font-size:.92rem}
  header h1 em{display:none}
  main{padding:12px 8px 50px}
  .step{padding:14px 10px}

}

<body>
<header>
  <h1>92期1隊 半自動勤排系統<em>114-2</em></h1>
  <span class="ver">v2.1</span>
</header>
<main>
  <section id="stepImport" class="step active">
    <h2><span class="num">1</span> 匯入排班資料</h2>
    <div class="drop-zone" id="dropZone">
      <p>拖放 <strong>排班資料</strong> 到此處</p>
      <p class="hint">或點擊選擇檔案</p>
      <input type="file" id="fileInput" accept=".xlsx,.xls">
    </div>
    <div id="importStatus"></div>
  </section>
  <section id="stepConfig" class="step">
    <h2><span class="num">2</span> 本週設定</h2>
    <div class="week-row">
      <label>第 <input type="number" id="weekNum" min="1" max="20" value="1"> 週</label>
      <span class="dates" id="weekDates"></span>
    </div>
    <div class="lastweek-upload" id="lastWeekUpload">
      <label class="lastweek-label">上週排班表（可選）</label>
      <div class="lastweek-row">
        <button class="btn btn-outline btn-sm" id="btnUploadLastWeek">上傳上週 Excel</button>
        <input type="file" id="lastWeekFile" accept=".xlsx,.xls" style="display:none">
        <span class="lastweek-status" id="lastWeekStatus">未載入</span>
      </div>
    </div>
    <h3>選擇本週要排的勤務</h3>
    <div class="duty-grid" id="dutyGrid"></div>
    <div class="summary-bar" id="configSummary" style="display:none"></div>
    <div class="btn-row">
      <button class="btn btn-gold" id="btnSchedule" disabled>產生勤務表</button>
      <button class="btn btn-outline" id="btnReimport">重新匯入</button>
    </div>
  </section>
  <section id="stepResults" class="step">
    <h2><span class="num">3</span> 排勤結果 <span style="font-size:.8rem;color:var(--text-m);font-weight:400;margin-left:8px">點擊格子可更換人員</span></h2>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="tab-bar" id="resultTabs"></div>
    <div id="resultPanels"></div>
    <div class="btn-row" style="margin-top:18px">
      <button class="btn btn-gold" id="btnFillEmpty">隨機填滿空格</button>
      <button class="btn btn-gold" id="btnExport">匯出 Excel</button>
      <button class="btn btn-blue" id="btnSave">儲存本週紀錄</button>
      <button class="btn btn-danger-outline" id="btnReconfig">重新設定</button>
    </div>
  </section>
  <section id="stepDashboard" class="step">
    <h2><span class="num">4</span> 時數總覽</h2>
    <div id="dashboard"></div>
  </section>
</main>
<div class="modal-overlay" id="pickerModal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="pickerTitle">選擇人員</h3>
      <button class="btn-x" id="pickerClose">&times;</button>
    </div>
    <div class="modal-search"><input type="text" id="pickerSearch" placeholder="搜尋學號或姓名..."></div>
    <label class="pk-toggle" id="pickerToggle"><input type="checkbox" id="pickerShowAll"><span id="pickerToggleLabel">顯示全部學員（忽略限制）</span></label>
    <div id="pickerClearRow" style="display:none"></div>
    <div class="picker-list" id="pickerList"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
/* ===== Safe DOM helpers ===== */
function h(tag,attrs,children){
  var e=document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(function(k){
    if(k==='className') e.className=attrs[k];
    else if(k==='textContent') e.textContent=attrs[k];
    else if(k.indexOf('on')===0) e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else e.setAttribute(k,attrs[k]);
  });
  if(children){
    if(typeof children==='string') e.textContent=children;
    else if(Array.isArray(children)) children.forEach(function(c){if(c)e.appendChild(c);});
    else e.appendChild(children);
  }
  return e;
}
function clearEl(el){while(el.firstChild)el.removeChild(el.firstChild);}

/* ===== CONSTANTS ===== */
var SEMESTER_START=new Date(2026,2,2);
var DEPT_MAP={
  '行政系':'行政系','犯防系預防組':'犯預','犯防系矯治組':'犯矯',
  '交通系交通組':'交通（交交）','交通系電訊組':'交通（交電）',
  '國境系境管組':'國境管理','國境系移民組':'國境移民',
  '行管系':'行管','安全系情報組':'安全情報','安全系社安組':'安全社安',
  '法律系':'法律','資管系':'資管','鑑識系':'鑑識','外事系':'外事',
  '水上系':'水上','刑事系':'刑事','消防系消防組':'消防','消防系災防組':'消防'
};
var ALL_DAYS=['日','一','二','三','四','五','六'];
var DUTY_DEFS={
  '值班':{label:'隊部值班',maleOnly:true,slots:['0600-0800','0800-1000','1000-1200','1200-1350','1350-1600','1600-1800','1800-2000','2000-2200','2200-2300'],defDays:['一','二','三','四','五'],defPP:1},
  '夜巡':{label:'友誼/警英夜巡',maleOnly:true,slots:['2300-0100','0100-0300','0300-0500'],defDays:['日','一','二','三','四','五'],defPP:2},
  '週間':{label:'週間校巡',maleOnly:true,slots:['2000-2200','2200-2400'],defDays:['一','二','三','四'],defPP:2},
  '校巡':{label:'假日校巡',maleOnly:false,slots:['0600-0800','0800-1000','1000-1200','1200-1400','1400-1600','1600-1800','1800-2000','2000-2200','2200-2400'],defDays:['五','六','日'],defPP:2},
  '寢巡':{label:'寢巡',maleOnly:true,slots:['1000-1200'],defDays:['五'],defPP:3},
  '警技館':{label:'警技館值班',maleOnly:true,slots:['1700-1800','1800-2000','2000-2200'],defDays:['一','二','三','四','五'],defPP:1},
  '監廚':{label:'監廚',maleOnly:true,slots:['0900-1000','1000-1100','1500-1600','1600-1700'],defDays:['一','二','三','四','五'],defPP:1},
  '總隊值星':{label:'總隊值星',maleOnly:true,slots:['0000-0200','0200-0400','0400-0600','0600-0800','0800-1000','1000-1200','1200-1350','1350-1550','1550-1800','1800-2000','2000-2200','2200-0000'],defDays:['日','一','二','三','四','五'],defPP:1}
};

/* ===== STATE ===== */
var S={students:[],freePeriods:{},weekNum:1,active:{},assignments:{},thisWeekIds:new Set(),history:{},cumHours:{},workbook:null,savedWeeks:new Set()};

/* ===== UTILS ===== */
function byId(id){return document.getElementById(id);}
var $=byId;
function showToast(msg){var t=byId('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
function timeToMin(t){return parseInt(t.slice(0,2))*60+parseInt(t.slice(2));}
function slotHours(slot){var p=slot.split('-'),s=timeToMin(p[0]),e=timeToMin(p[1]);if(e<=s)e+=1440;return(e-s)/60;}
function fmtSlot(slot){var p=slot.split('-');return p[0].slice(0,2)+':'+p[0].slice(2)+'-'+p[1].slice(0,2)+':'+p[1].slice(2);}
function dayOffset(day){var m={'一':0,'二':1,'三':2,'四':3,'五':4,'六':5,'日':6};return m[day]!=null?m[day]:0;}
function weekDate(wn,day){var d=new Date(SEMESTER_START);d.setDate(d.getDate()+(wn-1)*7+dayOffset(day));return(d.getMonth()+1)+'月'+d.getDate()+'日';}
function weekRange(wn){return weekDate(wn,'一')+' — '+weekDate(wn,'日');}

/* ===== Count-up Animation ===== */
function animateCount(el,target){
  var start=0,duration=600,startTime=null;
  function step(ts){
    if(!startTime)startTime=ts;
    var progress=Math.min((ts-startTime)/duration,1);
    var ease=1-Math.pow(1-progress,3);
    el.textContent=String(Math.round(start+ease*(target-start)));
    if(progress<1)requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

/* ===== PARSING ===== */
function classifySheet(name){
  if(name.indexOf('時數')>=0)return'時數';if(name.indexOf('空堂')>=0)return'空堂';
  if(name.indexOf('值星')>=0)return'值星';if(name.indexOf('警技館')>=0)return'警技館';
  if(name.indexOf('值班')>=0)return'值班';if(name.indexOf('夜巡')>=0)return'夜巡';
  if(name.indexOf('週間')>=0)return'週間';if(name.indexOf('校巡')>=0)return'校巡';
  if(name.indexOf('寢巡')>=0)return'寢巡';if(name.indexOf('監廚')>=0)return'監廚';
  return null;
}
function parseRoster(ws){
  var raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:null}),out=[];
  for(var r=1;r<raw.length;r++){
    var row=raw[r];
    if(!row||row[0]==null||typeof row[0]!=='number')continue;
    out.push({id:row[0],name:String(row[1]||''),gender:String(row[2]||''),dept:String(row[3]||''),note:String(row[15]||'')});
  }
  return out;
}
function parseFreePeriods(ws){
  var raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:null}),fp={};
  for(var r=1;r<raw.length;r++){
    var row=raw[r];if(!row||!row[0])continue;
    var wk=String(row[0]).trim(),desc=String(row[1]||''),deptStr=String(row[3]||'');
    var tm=desc.match(/(\d{4})-(\d{4})/);if(!tm)continue;
    var timeRange=tm[1]+'-'+tm[2];
    var depts=new Set();
    if(deptStr&&deptStr!=='無'){deptStr.split('、').forEach(function(d){d=d.trim();if(d)depts.add(d);});}
    if(!fp[wk])fp[wk]=[];
    fp[wk].push({time:timeRange,depts:depts});
  }
  return fp;
}
function loadWorkbook(wb){
  S.workbook=wb;S.students=[];S.studentMap={};S.freePeriods={};
  for(var i=0;i<wb.SheetNames.length;i++){
    var name=wb.SheetNames[i],ws=wb.Sheets[name],type=classifySheet(name);
    if(type==='時數')S.students=parseRoster(ws);
    else if(type==='空堂')S.freePeriods=parseFreePeriods(ws);
  }
  try{var saved=JSON.parse(localStorage.getItem('dutySchedulerHistory')||'{}');S.history=saved.history||{};S.cumHours=saved.cumHours||{};if(saved.assignments){S.assignments=saved.assignments;S.thisWeekIds=new Set();Object.keys(S.assignments).forEach(function(dt){Object.keys(S.assignments[dt]).forEach(function(k){(S.assignments[dt][k]||[]).forEach(function(p){if(p)S.thisWeekIds.add(p.id);});});});}}catch(e){}
}

/* ===== SCHEDULING ENGINE ===== */
var _unknownDepts = new Set();
function getDeptShort(full){
  if(DEPT_MAP[full]) return DEPT_MAP[full];
  if(full && !_unknownDepts.has(full)) { _unknownDepts.add(full); console.warn('未知科系對應：' + full); }
  return full;
}
function isStudentFree(dept,weekday,slot){
  // 週末無課程，視為全天可用（若未來有週末課程需調整此邏輯）
  if(weekday==='六'||weekday==='日')return true;
  var parts=slot.split('-'),ds=timeToMin(parts[0]),de=timeToMin(parts[1]);
  if(de<=ds)de+=1440;
  if(de<=360||ds>=1080)return true;
  var wk='週'+weekday,entries=S.freePeriods[wk]||[],sd=getDeptShort(dept);
  for(var i=0;i<entries.length;i++){
    var ep=entries[i].time.split('-'),es=timeToMin(ep[0]),ee=timeToMin(ep[1]);
    if(ee<=es)ee+=1440;
    if(ds<ee&&de>es){if(!entries[i].depts.has(sd))return false;}
  }
  return true;
}
function getLastWeekIds(){var prev=S.history[S.weekNum-1];return prev?new Set(prev.ids):new Set();}
function parseLastWeekExcel(wb){
  var studentIds=new Set(S.students.map(function(s){return s.id;}));
  var found=new Set();
  wb.SheetNames.forEach(function(name){
    var ws=wb.Sheets[name];
    var range=XLSX.utils.decode_range(ws['!ref']||'A1');
    for(var R=range.s.r;R<=range.e.r;R++){
      for(var C=range.s.c;C<=range.e.c;C++){
        var cell=ws[XLSX.utils.encode_cell({r:R,c:C})];
        if(!cell)continue;
        var v=(cell.t==='n')?cell.v:parseInt(cell.v);
        if(v&&studentIds.has(v))found.add(v);
      }
    }
  });
  return Array.from(found);
}
function isNightSlot(slot){return timeToMin(slot.split('-')[0])>=1200;}
function slotsOverlap(slots,day,slot){
  if(!slots||slots.length===0)return false;
  var p=slot.split('-'),s1=timeToMin(p[0]),e1=timeToMin(p[1]);
  if(e1<=s1)e1+=1440;
  for(var i=0;i<slots.length;i++){
    if(slots[i].day!==day)continue;
    var q=slots[i].slot.split('-'),s2=timeToMin(q[0]),e2=timeToMin(q[1]);
    if(e2<=s2)e2+=1440;
    if(s1<e2&&s2<e1)return true;
  }
  return false;
}
/* Use studentMap for O(1) lookup instead of linear find() (Defect #22) */
function getStudentGender(id){var s=S.studentMap[id];return s?s.gender:null;}
function getAvailable(dutyType,day,slot,tempRelease){
  var def=DUTY_DEFS[dutyType],lastWeek=getLastWeekIds();
  return S.students.filter(function(s){
    if(def.maleOnly&&s.gender!=='男')return false;
    if(dutyType==='校巡'&&isNightSlot(slot)&&s.gender==='女')return false;
    if(S.thisWeekIds.has(s.id)&&!(tempRelease&&tempRelease.has(s.id)))return false;
    if(lastWeek.has(s.id))return false;
    if(!isStudentFree(s.dept,day,slot))return false;
    return true;
  });
}
function generateEmptySchedule(){
  S.assignments={};S.thisWeekIds=new Set();
  Object.keys(S.active).forEach(function(dtype){
    var cfg=S.active[dtype],def=DUTY_DEFS[dtype];
    S.assignments[dtype]={};
    cfg.days.forEach(function(day){
      def.slots.forEach(function(slot){
        var key=day+'|'+slot;
        S.assignments[dtype][key]=[];
        for(var i=0;i<cfg.pp;i++){S.assignments[dtype][key].push(undefined);}
      });
    });
  });
}
function fillRemainingSlots(){
  /* 收集已手動指派的人到 thisWeekIds，並建立 assignedSlots Map */
  S.thisWeekIds=new Set();
  var assignedSlots=new Map();
  Object.keys(S.assignments).forEach(function(dtype){
    Object.keys(S.assignments[dtype]).forEach(function(key){
      var parts=key.split('|'),day=parts[0],slot=parts[1];
      (S.assignments[dtype][key]||[]).forEach(function(p){
        if(p){
          S.thisWeekIds.add(p.id);
          if(!assignedSlots.has(p.id))assignedSlots.set(p.id,[]);
          assignedSlots.get(p.id).push({day:day,slot:slot});
        }
      });
    });
  });
  var lastWeek=getLastWeekIds(),targets=[];
  Object.keys(S.active).forEach(function(dtype){
    var cfg=S.active[dtype],def=DUTY_DEFS[dtype];
    cfg.days.forEach(function(day){
      def.slots.forEach(function(slot){
        var key=day+'|'+slot;
        if(!S.assignments[dtype][key])S.assignments[dtype][key]=[];
        var eligible=S.students.filter(function(s){
          if(def.maleOnly&&s.gender!=='男')return false;
          if(dtype==='校巡'&&isNightSlot(slot)&&s.gender==='女')return false;
          if(lastWeek.has(s.id))return false;
          if(!isStudentFree(s.dept,day,slot))return false;
          return true;
        }).length;
        for(var i=0;i<cfg.pp;i++){
          if(!S.assignments[dtype][key][i]){
            targets.push({dtype:dtype,day:day,slot:slot,key:key,idx:i,eligible:eligible});
          }
        }
      });
    });
  });
  targets.sort(function(a,b){return a.eligible-b.eligible;});
  var fillCount=0;
  for(var t=0;t<targets.length;t++){
    if(fillCount>0&&fillCount%10===0){
      for(var rt=t;rt<targets.length;rt++){
        var rtg=targets[rt],rdef=DUTY_DEFS[rtg.dtype];
        rtg.eligible=S.students.filter(function(s){
          if(rdef.maleOnly&&s.gender!=='男')return false;
          if(rtg.dtype==='校巡'&&isNightSlot(rtg.slot)&&s.gender==='女')return false;
          if(S.thisWeekIds.has(s.id))return false;
          if(lastWeek.has(s.id))return false;
          if(!isStudentFree(s.dept,rtg.day,rtg.slot))return false;
          return true;
        }).length;
      }
      var remaining=targets.slice(t);
      remaining.sort(function(a,b){return a.eligible-b.eligible;});
      for(var ri=0;ri<remaining.length;ri++){targets[t+ri]=remaining[ri];}
    }
    var tg=targets[t],def=DUTY_DEFS[tg.dtype];
    var cands=S.students.filter(function(s){
      if(def.maleOnly&&s.gender!=='男')return false;
      if(tg.dtype==='校巡'&&isNightSlot(tg.slot)&&s.gender==='女')return false;
      if(S.thisWeekIds.has(s.id))return false;
      if(lastWeek.has(s.id))return false;
      if(!isStudentFree(s.dept,tg.day,tg.slot))return false;
      /* Cross-duty time overlap guard (Defect #4): reject if slot overlaps an already-assigned slot */
      if(slotsOverlap(assignedSlots.get(s.id),tg.day,tg.slot))return false;
      return true;
    });
    cands.sort(function(a,b){return(S.cumHours[a.id]||0)-(S.cumHours[b.id]||0)||(Math.random()-0.5);});
    if(tg.dtype==='校巡'&&tg.idx>0&&cands.length>0){
      var assigned=S.assignments[tg.dtype][tg.key];
      var hasM=assigned.some(function(p){return p&&getStudentGender(p.id)==='男';});
      var hasF=assigned.some(function(p){return p&&getStudentGender(p.id)==='女';});
      if(hasM||hasF){
        var prefer=hasM?'女':'男';
        var preferred=cands.filter(function(s){return s.gender===prefer;});
        var rest=cands.filter(function(s){return s.gender!==prefer;});
        cands=preferred.concat(rest);
      }
    }
    if(cands.length>0){
      var c=cands[0];
      S.assignments[tg.dtype][tg.key][tg.idx]={id:c.id,name:c.name};
      S.thisWeekIds.add(c.id);
      if(!assignedSlots.has(c.id))assignedSlots.set(c.id,[]);
      assignedSlots.get(c.id).push({day:tg.day,slot:tg.slot});
      fillCount++;
    }
  }
  /* Count empty slots after scheduling completes (Defect #5) */
  var emptyCount=0;
  for(var t2=0;t2<targets.length;t2++){

    if(!S.assignments[tg2.dtype][tg2.key]||S.assignments[tg2.dtype][tg2.key].length<=tg2.idx){emptyCount++;}
  }
  S.emptySlotCount=emptyCount;
}

function buildDutyTable(dtype){

/* ===== UI: Picker ===== */
var pickerCtx=null,pickerState={};
function getAllStudentsForPicker(dtype,day,slot,slotIds,current){
  var def=DUTY_DEFS[dtype],lastWeek=getLastWeekIds();
  var tempRelease=new Set();if(current)tempRelease.add(current.id);
  return S.students.filter(function(s){
    if(slotIds.has(s.id))return false;
    if(current&&s.id===current.id)return false;
    return true;
  }).map(function(s){
    var reasons=[];
    if(def.maleOnly&&s.gender!=='男')reasons.push('gender');
    if(dtype==='校巡'&&isNightSlot(slot)&&s.gender==='女')reasons.push('night');
    if(S.thisWeekIds.has(s.id)&&!(tempRelease&&tempRelease.has(s.id)))reasons.push('thisWeek');
    if(lastWeek.has(s.id))reasons.push('lastWeek');
    if(!isStudentFree(s.dept,day,slot))reasons.push('busy');
    return{id:s.id,name:s.name,dept:s.dept,gender:s.gender,reasons:reasons};
  });
}
function openPicker(dtype,day,slot,idx,tdEl){
  pickerCtx={dtype:dtype,day:day,slot:slot,idx:idx,tdEl:tdEl};
  var def=DUTY_DEFS[dtype],key=day+'|'+slot;
  var arr=S.assignments[dtype]&&S.assignments[dtype][key]||[];
  var current=arr[idx];
  byId('pickerTitle').textContent=def.label+' | '+weekDate(S.weekNum,day)+'('+day+') '+fmtSlot(slot);
  var slotIds=new Set();arr.forEach(function(p,i){if(p&&i!==idx)slotIds.add(p.id);});
  var tempRelease=new Set();if(current)tempRelease.add(current.id);
  var candidates=getAvailable(dtype,day,slot,tempRelease).filter(function(s){return!slotIds.has(s.id);});
  candidates.sort(function(a,b){return(S.cumHours[a.id]||0)-(S.cumHours[b.id]||0);});
  var allStudents=getAllStudentsForPicker(dtype,day,slot,slotIds,current);
  allStudents.sort(function(a,b){return(a.reasons.length-b.reasons.length)||(S.cumHours[a.id]||0)-(S.cumHours[b.id]||0);});
  var autoShowAll=candidates.length===0;
  var cb=byId('pickerShowAll');
  cb.checked=autoShowAll;
  var toggle=byId('pickerToggle');
  toggle.classList.toggle('auto',autoShowAll);
  byId('pickerToggleLabel').textContent=autoShowAll?'已自動開啟：無符合條件人員，顯示全部學員':'顯示全部學員（忽略限制）';
  pickerState={candidates:candidates,allStudents:allStudents,current:current,showAll:autoShowAll};
  refreshPickerList();
  $('pickerSearch').value='';
  $('pickerModal').classList.add('show');
  document.body.style.overflow='hidden';
  setTimeout(function(){$('pickerSearch').focus();},150);
  $('pickerSearch').oninput=function(){refreshPickerList();};
  cb.onchange=function(){
    pickerState.showAll=cb.checked;
    toggle.classList.toggle('auto',false);
    byId('pickerToggleLabel').textContent='顯示全部學員（忽略限制）';
    refreshPickerList();
  };
}
function refreshPickerList(){
  var q=byId('pickerSearch').value.trim().toLowerCase();
  var src=pickerState.showAll?pickerState.allStudents:pickerState.candidates;
  var filtered=q?src.filter(function(s){return String(s.id).indexOf(q)>=0||s.name.toLowerCase().indexOf(q)>=0||s.dept.toLowerCase().indexOf(q)>=0;}):src;
  renderPickerList(filtered,pickerState.current,pickerState.showAll);
}
function renderPickerList(candidates,current,showAll){
  var list=$('pickerList');clearEl(list);
  var clearRow=$('pickerClearRow');clearEl(clearRow);
  if(current){
    clearRow.style.display='block';
    var clr=h('div',{className:'pk-clear'},'\u2715 清除此格（移除 '+current.id+' '+current.name+'）');
    clr.addEventListener('click',function(){assignPerson(null);closePicker();});
    clearRow.appendChild(clr);
  }else{clearRow.style.display='none';}
  if(candidates.length===0){
    var empty=h('div',{className:'pk-empty'},showAll?'搜尋無結果':'目前沒有符合條件的可用人員');
    list.appendChild(empty);
    return;
  }
  if(!showAll){
    var hint=h('div',{className:'pk-hint'},'以下均為上週未排勤、本週未指派、該時段空堂之人員（'+candidates.length+'人）');
    list.appendChild(hint);
  }
  candidates.forEach(function(s){
    var forced=showAll&&s.reasons&&s.reasons.length>0;
    var item=h('div',{className:'pk-item'+(forced?' forced':'')});
    item.appendChild(h('span',{className:'pk-id'},String(s.id)));
    var nameSpan=h('span',{className:'pk-name'},s.name);
    item.appendChild(nameSpan);
    if(forced){
      s.reasons.forEach(function(r){
        var badge=h('span',{className:'pk-badge '+r});
        if(r==='busy')badge.textContent='有課';
        else if(r==='thisWeek')badge.textContent='本週';
        else if(r==='lastWeek')badge.textContent='上週';
        else if(r==='gender')badge.textContent='性別';
        else if(r==='night')badge.textContent='夜間';
        nameSpan.appendChild(badge);
      });
    }
    item.appendChild(h('span',{className:'pk-dept'},s.dept));
    var hrs=S.cumHours[s.id]||0;
    item.appendChild(h('span',{className:'pk-hrs'},hrs?hrs.toFixed(1)+'h':'0h'));
    item.addEventListener('click',function(){assignPerson(s);closePicker();});
    list.appendChild(item);
  });
}
function assignPerson(student){
  if(!pickerCtx)return;
  var ctx=pickerCtx,key=ctx.day+'|'+ctx.slot;
  if(!S.assignments[ctx.dtype])S.assignments[ctx.dtype]={};
  if(!S.assignments[ctx.dtype][key])S.assignments[ctx.dtype][key]=[];
  var arr=S.assignments[ctx.dtype][key],old=arr[ctx.idx];
  if(old){
    var still=false;
    Object.keys(S.assignments).forEach(function(dt){Object.keys(S.assignments[dt]).forEach(function(k){
      S.assignments[dt][k].forEach(function(p,i){
        if(dt===ctx.dtype&&k===key&&i===ctx.idx)return;
        if(p&&p.id===old.id)still=true;
      });
    });});
    if(!still)S.thisWeekIds.delete(old.id);
  }
  if(student){
    arr[ctx.idx]={id:student.id,name:student.name};
    S.thisWeekIds.add(student.id);
    showToast('已指派 '+student.id+' '+student.name);
  }else{
    arr[ctx.idx]=undefined;
    showToast('已清除');
  }
  /* Update just the clicked cell instead of rebuilding the entire table (Defect #23) */
  if(ctx.tdEl){
    clearEl(ctx.tdEl);ctx.tdEl.className='person-cell';
    if(student){
      ctx.tdEl.classList.add('filled');
      ctx.tdEl.appendChild(h('div',{className:'pid'},String(student.id)));
      ctx.tdEl.appendChild(h('div',{className:'pname'},student.name));
    }else{ctx.tdEl.classList.add('empty-slot');ctx.tdEl.textContent='+';}
  }else{
    var panel=byId('panel-'+ctx.dtype);
    if(panel){clearEl(panel);panel.appendChild(buildDutyTable(ctx.dtype));}
  }
  renderStatsBar();renderDashboard();
}
function closePicker(){$('pickerModal').classList.remove('show');document.body.style.overflow='';pickerCtx=null;}

function renderDashboard(){

    Object.keys(S.assignments[dtype]).forEach(function(key){
      var slot=key.split('|')[1],hrs=slotHours(slot);

  });
  dash.appendChild(chart);
}

/* ===== EXPORT (styled xlsx-js-style, matches original format) ===== */
function downloadBlob(blob,fname){
  /* Mobile: use Web Share API (opens native share sheet on iOS/Android) */
  if(typeof navigator.share==='function'&&typeof File!=='undefined'){
    try{
      var file=new File([blob],fname,{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:fname}).then(function(){
          showToast('Excel 已分享');
        }).catch(function(err){
          if(err.name!=='AbortError')blobAnchorDownload(blob,fname);
        });
        return;
      }
    }catch(e){/* File constructor not supported, fall through */}
  }
  blobAnchorDownload(blob,fname);
}
function blobAnchorDownload(blob,fname){
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=fname;a.style.display='none';
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},500);
  showToast('Excel 已下載');
}

  var TIME_FONT={'\u5BE2\u5DE1':'\u6A19\u6977\u9AD4-\u7E41','\u8B66\u6280\u9928':'\u6A19\u6977\u9AD4-\u7E41'};
  /* Slot format: raw=no colons, fullwidth=\uFF1A+newline, halfwidth=default */
  var SLOT_FMT={'\u503C\u73ED':'raw','\u76E3\u5EDA':'raw','\u7E3D\u968A\u503C\u661F':'raw','\u6821\u5DE1':'raw','\u591C\u5DE1':'fullwidth','\u5BE2\u5DE1':'fullwidth','\u8B66\u6280\u9928':'fullwidth','\u9031\u9593':'fullwidth'};
  function fmtSlotEx(slot,fmt){var p=slot.split('-');if(fmt==='raw')return p[0]+'-'+p[1];if(fmt==='fullwidth')return p[0].slice(0,2)+'\uFF1A'+p[0].slice(2)+'-\n'+p[1].slice(0,2)+'\uFF1A'+p[1].slice(2);return p[0].slice(0,2)+':'+p[0].slice(2)+'-'+p[1].slice(0,2)+':'+p[1].slice(2);}
  var noteText='\u5099\u8A3B\uFF1A\n1\u3001\u8F2A\u503C\u52E4\u52D9\uFF0C\u8ACB\u540C\u5B78\u52D9\u5FC5\u63D0\u65E95-10\u5206\u9418\u5230\u52E4\u3002\n2\u3001\u8ACB\u540C\u5B78\u4E92\u76F8\u63D0\u9192\u503C\u52E4\u6642\u9593\u3002\n3\u3001\u5982\u6709\u7591\u554F(\u5982\u885D\u5802\u3001\u56E0\u6545\u7121\u6CD5\u503C\u73ED\u7B49)\uFF0C\u8ACB\u5411\u52E4\u52D9\u6392\u8868\u54E1921127\u6C5F\u777F\u627F(B218)\u3001921165\u8B1D\u9821\u8B6F(B218)\u53CD\u6620\u3002\n4\u3001\u672C\u8868\u516C\u5E03\u5F8C\uFF0C\u8ACB\u540C\u5B78\u65BC\u81EA\u5DF1\u540D\u5B57\u4E0B\u65B9\u7C3D\u540D(\u62BC\u6642\u9593)\u78BA\u8A8D\uFF0C\u5982\u9700\u66F4\u6539\uFF0C\u8ACB\u5831\u7531\u5340\u968A\u9577\u6838\u7AE0\u4FEE\u6B63\uFF0C\u82E5\u903E\u6642\u672A\u7C3D\u540D\u8005\uFF0C\u5C07\u4F9D\u898F\u5B9A\u8A18\u9EDE\u8655\u5206\u3002';
  /* Horizontal layout: 校巡 (people side-by-side, pp*2 cols/day, 2 rows/slot) */
  var HORIZ={'校巡':true};
  var TITLE_MAP={'\u503C\u73ED':'\u968A\u90E8\u503C\u73ED\u8868','\u591C\u5DE1':'\u53CB\u8ABC\u3001\u8B66\u82F1\u591C\u5DE1\u52E4\u52D9\u8868','\u9031\u9593':'\u9031\u9593\u6821\u5DE1\u52E4\u52D9\u8868','\u6821\u5DE1':'\u7E3D\u968A\u503C\u661F\u5047\u65E5\u6821\u5712\u5DE1\u908F\u52E4\u52D9\u8868','\u5BE2\u5DE1':' \u5BE2\u5DE1\u52E4\u52D9\u8868','\u8B66\u6280\u9928':' \u8B66\u6280\u9928\u503C\u73ED\u52E4\u52D9\u8868','\u76E3\u5EDA':'\u76E3\u5EDA\u52E4\u52D9\u8868','\u7E3D\u968A\u503C\u661F':' \u7E3D\u968A\u503C\u661F\u9031\u968A\u90E8\u503C\u73ED\u8868'};

  Object.keys(S.active).forEach(function(dtype){
    var cfg=S.active[dtype],def=DUTY_DEFS[dtype];
    var days=cfg.days,pp=cfg.pp,horiz=!!HORIZ[dtype];
    var colsPerDay=horiz?pp*2:2;
    var rowsPerSlot=horiz?2:pp*2;
    var totalCols=1+days.length*colsPerDay;
    var aoa=[],merges=[],rh=[];
    /* Per-sheet dynamic styles (no bold, font sizes vary by duty type) */
    var fs=FONT_SIZES[dtype]||{title:22,hdrLabel:18,dateVal:20,dayVal:24,time:18,data:24,note:20};
    var timeFN=TIME_FONT[dtype]||FN;
    var slotFmt=SLOT_FMT[dtype]||'halfwidth';
    var hh=HDR_HEIGHTS[dtype]||{date:28,day:34};
    var sTitle={font:{sz:fs.title,name:FN},alignment:{horizontal:'center',vertical:'center',wrapText:true},border:bdrAll,fill:{patternType:'solid',fgColor:{rgb:'FFFFFF'}}};
    var sHdrLabel={font:{sz:fs.hdrLabel,name:FN},alignment:{horizontal:'center',vertical:'center',wrapText:true},border:bdrAll,fill:{patternType:'solid',fgColor:{rgb:'FFFFFF'}}};
    var sDateVal={font:{sz:fs.dateVal,name:FN},alignment:{horizontal:'center',vertical:'center',wrapText:true},border:bdrAll,fill:{patternType:'solid',fgColor:{rgb:'FFFFFF'}}};
    var sDayVal={font:{sz:fs.dayVal,name:FN},alignment:{horizontal:'center',vertical:'center',wrapText:true},border:bdrAll,fill:{patternType:'solid',fgColor:{rgb:'FFFFFF'}}};
    var sTime={font:{sz:fs.time,name:timeFN},alignment:{horizontal:'center',vertical:'center',wrapText:true},border:bdrAll,fill:{patternType:'solid',fgColor:{rgb:'FFFFFF'}}};
    var sNote={font:{sz:fs.note,name:FN},alignment:{horizontal:'left',vertical:'top',wrapText:true},border:bdrAll,fill:{patternType:'solid',fgColor:{rgb:'FFFFFF'}}};
    /* Per-sheet data cell styles (ID/Name/Sig) using fs.data */
    var sId={font:{sz:fs.data,name:FN},alignment:{horizontal:'center',vertical:'center'},border:bdrId,fill:{patternType:'solid',fgColor:{rgb:'D8D8D8'}}};
    var sName={font:{sz:fs.data,name:FN},alignment:{horizontal:'center',vertical:'center'},border:bdrName,fill:{patternType:'solid',fgColor:{rgb:'FFFFFF'}}};
    var sSig={font:{sz:fs.data,name:FN},alignment:{horizontal:'center',vertical:'center'},border:bdrAll,fill:{patternType:'solid',fgColor:{rgb:'FFFFFF'}}};
    var sNameEmpty={font:{sz:fs.data,name:FN},alignment:{horizontal:'center',vertical:'center'},border:bdrName,fill:grayFill};
    var sSigEmpty={font:{sz:fs.data,name:FN},alignment:{horizontal:'center',vertical:'center'},border:bdrAll,fill:grayFill};
    var sHoliday={font:{sz:fs.holiday||fs.data,name:FN},alignment:{horizontal:'center',vertical:'center'},border:bdrAll,fill:grayFill};

    /* Detect empty days (all slots empty → holiday) */
    var emptyDays=new Set();
    for(var di=0;di<days.length;di++){var dayEmpty=true;for(var si=0;si<def.slots.length&&dayEmpty;si++){var key=days[di]+'|'+def.slots[si],arr=S.assignments[dtype]&&S.assignments[dtype][key]||[];for(var pi=0;pi<pp;pi++){if(arr[pi]){dayEmpty=false;break;}}}if(dayEmpty)emptyDays.add(di);}

    /* Row 0: Title */
    var titleLabel=TITLE_MAP[dtype]||def.label;
    var title='\u4E2D\u592E\u8B66\u5BDF\u5927\u5B78 92\u671F1\u968A  114\u5B78\u5E74\u5EA6\u7B2C2\u5B78\u671F'+titleLabel+'  (\u7B2C'+S.weekNum+'\u9031)';
    var titleRow=new Array(totalCols).fill('');titleRow[0]=title;
    aoa.push(titleRow);merges.push({s:{r:0,c:0},e:{r:0,c:totalCols-1}});
    rh.push({hpt:33});

    /* Row 1: Dates */
    var dateRow=new Array(totalCols).fill('');dateRow[0]='\u65E5\u671F';
    for(var i=0;i<days.length;i++){var dc=1+i*colsPerDay;dateRow[dc]=weekDate(S.weekNum,days[i]);merges.push({s:{r:1,c:dc},e:{r:1,c:dc+colsPerDay-1}});}
    aoa.push(dateRow);rh.push({hpt:hh.date});

    /* Row 2: Days */
    var dayRow=new Array(totalCols).fill('');dayRow[0]='\u661F\u671F';
    for(var i=0;i<days.length;i++){var dc=1+i*colsPerDay;dayRow[dc]=days[i];merges.push({s:{r:2,c:dc},e:{r:2,c:dc+colsPerDay-1}});}
    aoa.push(dayRow);rh.push({hpt:hh.day});

    /* Data rows: each slot = name rows + signature rows */
    var r=3;
    def.slots.forEach(function(slot){
      if(horiz){
        /* Horizontal: 2 rows per slot (name + sig), pp people side by side */
        var nameRow=new Array(totalCols).fill('');
        var sigRow=new Array(totalCols).fill('');
        nameRow[0]=fmtSlotEx(slot,slotFmt);
        for(var i=0;i<days.length;i++){
          var key=days[i]+'|'+slot,arr=S.assignments[dtype]&&S.assignments[dtype][key]||[];
          for(var p=0;p<pp;p++){
            var dc=1+i*colsPerDay+p*2;
            if(arr[p]){nameRow[dc]=String(arr[p].id).padStart(3,'0');nameRow[dc+1]=arr[p].name;}
          }
          /* Merge signature cells per person (skip holiday days) */
          if(!emptyDays.has(i)){for(var p=0;p<pp;p++){
            var dc=1+i*colsPerDay+p*2;
            merges.push({s:{r:r+1,c:dc},e:{r:r+1,c:dc+1}});
          }}
        }
        aoa.push(nameRow);aoa.push(sigRow);
        merges.push({s:{r:r,c:0},e:{r:r+1,c:0}});
        rh.push({hpt:45});rh.push({hpt:60});
        r+=2;
      }else{
        /* Vertical: pp*2 rows per slot, each person = name row + sig row */
        for(var p=0;p<pp;p++){
          var nameRow=new Array(totalCols).fill('');
          var sigRow=new Array(totalCols).fill('');
          if(p===0)nameRow[0]=fmtSlotEx(slot,slotFmt);
          for(var i=0;i<days.length;i++){
            var key=days[i]+'|'+slot,arr=S.assignments[dtype]&&S.assignments[dtype][key]||[];
            var dc=1+i*2;
            if(arr[p]){nameRow[dc]=String(arr[p].id).padStart(3,'0');nameRow[dc+1]=arr[p].name;}
            /* Merge signature row B:C for this day (skip holiday days) */
            if(!emptyDays.has(i))merges.push({s:{r:r+p*2+1,c:dc},e:{r:r+p*2+1,c:dc+1}});
          }
          aoa.push(nameRow);aoa.push(sigRow);
          rh.push({hpt:45});rh.push({hpt:60});
        }
        /* Merge time col across all rows for this slot */
        if(rowsPerSlot>1)merges.push({s:{r:r,c:0},e:{r:r+rowsPerSlot-1,c:0}});
        r+=rowsPerSlot;
      }
    });

    /* Holiday: merge entire day column for empty days, write 放假 */
    var noteR=r;
    emptyDays.forEach(function(di){var dc=1+di*(horiz?colsPerDay:2),endC=dc+(horiz?colsPerDay:2)-1;merges.push({s:{r:3,c:dc},e:{r:noteR-1,c:endC}});});

    /* Note row */
    var noteRow=new Array(totalCols).fill('');noteRow[0]=noteText;
    aoa.push(noteRow);merges.push({s:{r:noteR,c:0},e:{r:noteR+4,c:totalCols-1}});
    /* Add 4 extra empty rows for note area */
    for(var n=0;n<4;n++){aoa.push(new Array(totalCols).fill(''));rh.push({hpt:36});}
    rh.push({hpt:36});

    /* Build worksheet */
    var ws=XLSX.utils.aoa_to_sheet(aoa);
    ws['!merges']=merges;

    /* Set holiday text in merged cells */
    emptyDays.forEach(function(di){var dc=1+di*(horiz?colsPerDay:2);var addr=XLSX.utils.encode_cell({r:3,c:dc});ws[addr]={t:'s',v:'\u653E\u5047'};});

    /* Build holiday column lookup for style loop */
    var hCols=[];emptyDays.forEach(function(di){var dc=1+di*(horiz?colsPerDay:2),endC=dc+(horiz?colsPerDay:2)-1;hCols.push([dc,endC]);});

    /* Apply styles */
    var DATA_START_ROW = 3; // After title(0), date(1), weekday(2) rows
    var range=XLSX.utils.decode_range(ws['!ref']);
    for(var R=range.s.r;R<=range.e.r;R++){
      for(var C=range.s.c;C<=range.e.c;C++){
        var addr=XLSX.utils.encode_cell({r:R,c:C});
        if(!ws[addr])ws[addr]={t:'s',v:''};
        if(R===0){ws[addr].s=sTitle;}
        else if(R===1){ws[addr].s=(C===0)?sHdrLabel:sDateVal;}
        else if(R===2){ws[addr].s=(C===0)?sHdrLabel:sDayVal;}
        else if(R>=noteR){ws[addr].s=sNote;}
        else if(C===0){ws[addr].s=sTime;}
        else{
          /* Check if cell is in a holiday (empty day) column */
          var inH=false;for(var hi=0;hi<hCols.length;hi++){if(C>=hCols[hi][0]&&C<=hCols[hi][1]){inH=true;break;}}
          if(inH){ws[addr].s=sHoliday;}
          else{
          /* 判斷此格是否為空（無人指派）*/
          var nameR=(R-3)%2===1?R-1:R;
          var idC=(C-1)%2===0?C:C-1;
          var idAddr=XLSX.utils.encode_cell({r:nameR,c:idC});
          var slotEmpty=!ws[idAddr]||!ws[idAddr].v;
          if((R-3)%2===1){ws[addr].s=slotEmpty?sSigEmpty:sSig;}
          else if((C-1)%2===0){ws[addr].s=sId;}
          else{ws[addr].s=slotEmpty?sNameEmpty:sName;}
          }
        }
      }
    }

    /* Column widths (per duty type, matching reference ODS) */
    var cwDef=COL_WIDTHS[dtype]||{time:11,id:7,name:14};
    var cw=[{wch:cwDef.time}];
    for(var i=0;i<days.length;i++){
      if(horiz){for(var p=0;p<pp;p++)cw.push({wch:cwDef.id},{wch:cwDef.name});}
      else{cw.push({wch:cwDef.id},{wch:cwDef.name});}
    }
    ws['!cols']=cw;
    ws['!rows']=rh;

    XLSX.utils.book_append_sheet(wb,ws,def.label.replace(/[:\\\/\?\*\[\]]/g,'').slice(0,31));
  });
  if(!wb.SheetNames.length){showToast('\u8ACB\u5148\u5B8C\u6210\u6392\u52E4\u518D\u532F\u51FA');return;}
  var fname='\u52E4\u52D9\u6392\u73ED_\u7B2C'+S.weekNum+'\u9031.xlsx';
  try{
    var wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    var blob=new Blob([wbout],{type:'application/octet-stream'});
    downloadBlob(blob,fname);
  }catch(e){showToast('\u532F\u51FA\u5931\u6557\uFF1A'+e.message);}
}

/* ===== PERSISTENCE ===== */
function saveWeek(){
  if(S.savedWeeks.has(S.weekNum)){showToast('第 '+S.weekNum+' 週已儲存過，請勿重複儲存');return;}
  var weekHrs={};
  Object.keys(S.assignments).forEach(function(dtype){
    Object.keys(S.assignments[dtype]).forEach(function(key){
      var slot=key.split('|')[1],hrs=slotHours(slot);
      (S.assignments[dtype][key]||[]).forEach(function(p){if(p)weekHrs[p.id]=(weekHrs[p.id]||0)+hrs;});
    });
  });
  Object.keys(weekHrs).forEach(function(id){S.cumHours[id]=(S.cumHours[id]||0)+weekHrs[id];});
  S.history[S.weekNum]={ids:Array.from(S.thisWeekIds)};
  S.savedWeeks.add(S.weekNum);
  try{localStorage.setItem('dutySchedulerHistory',JSON.stringify({history:S.history,cumHours:S.cumHours,assignments:S.assignments}));}catch(e){showToast('儲存失敗：儲存空間不足');return;}
  showToast('第 '+S.weekNum+' 週紀錄已儲存（'+S.thisWeekIds.size+' 人）');
}

/* ===== INIT ===== */
function handleFile(file){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result);loadWorkbook(wb);
      if(S.students.length===0)throw new Error('找不到勤務時數總表');
      var status=byId('importStatus');clearEl(status);
      var div=h('div',{className:'import-ok'},
        '\u2713 匯入成功：'+S.students.length+' 位學員（男 '+S.students.filter(function(s){return s.gender==='男';}).length+' / 女 '+S.students.filter(function(s){return s.gender==='女';}).length+'），'+Object.keys(S.freePeriods).length+' 天空堂資料');
      status.appendChild(div);
      var details=h('details',{style:'margin-top:10px'});
      var summary=h('summary',{style:'cursor:pointer;color:var(--gold);font-size:.88rem'},'查看學員名冊');
      details.appendChild(summary);
      var rosterDiv=h('div',{style:'max-height:300px;overflow-y:auto;margin-top:8px;font-size:.82rem'});
      S.students.forEach(function(s){
        rosterDiv.appendChild(h('div',{style:'padding:2px 0;border-bottom:1px solid var(--border)'},s.id+' '+s.name+' ('+s.gender+') '+s.dept));
      });
      details.appendChild(rosterDiv);
      status.appendChild(details);
      showStep(['stepImport','stepConfig']);
      updateConfigSummary();showToast('匯入成功');
    }catch(err){
      var msg = err.message;
      if(msg.indexOf('找不到')>=0) msg = '找不到「勤務時數總表」工作表，請確認 Excel 檔案格式正確';
      else if(msg.indexOf('File is not')>=0 || msg.indexOf('Unsupported')>=0) msg = '不是有效的 Excel 檔案，請選擇 .xlsx 格式';
      var status=byId('importStatus');clearEl(status);
      status.appendChild(h('div',{className:'import-err'},'\u2715 匯入失敗：'+msg));
    }
  };
  reader.readAsArrayBuffer(file);
}
function init(){
  $('resultTabs').addEventListener('click',function(e){
    var btn=e.target.closest('.tab-btn');if(!btn)return;
    var tabBar=$('resultTabs'),panels=$('resultPanels');
    tabBar.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
    panels.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active');});
    btn.classList.add('active');
    $('panel-'+btn.getAttribute('data-duty')).classList.add('active');
  });
  renderConfig();
  var dz=byId('dropZone'),fi=byId('fileInput');
  dz.addEventListener('click',function(e){if(e.target!==fi)fi.click();});
  dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('dragover');});
  dz.addEventListener('dragleave',function(){dz.classList.remove('dragover');});
  dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('dragover');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);});
  fi.addEventListener('change',function(){if(fi.files[0])handleFile(fi.files[0]);fi.value='';});
  $('btnSchedule').addEventListener('click',function(){
    var btn=$('btnSchedule');
    btn.disabled=true;
    var spinner=h('span',{className:'spinner'});
    btn.insertBefore(spinner,btn.firstChild);
    setTimeout(function(){
      generateEmptySchedule();renderResults();renderDashboard();
      showStep(['stepImport','stepConfig','stepResults','stepDashboard']);
      btn.removeChild(spinner);
      btn.disabled=false;
      $('stepResults').scrollIntoView({behavior:'smooth'});
      showToast('已產生空白勤務表，可手動指派後再填滿');
    },300);
  });
  $('btnFillEmpty').addEventListener('click',function(){
    if(!S.assignments||Object.keys(S.assignments).length===0){showToast('請先產生勤務表');return;}
    var btn=$('btnFillEmpty');
    btn.disabled=true;
    var spinner=h('span',{className:'spinner'});
    btn.insertBefore(spinner,btn.firstChild);
    setTimeout(function(){
      fillRemainingSlots();renderResults();renderDashboard();
      btn.removeChild(spinner);
      btn.disabled=false;
      showToast('已隨機填滿所有空格');
    },300);
  });
  $('btnReimport').addEventListener('click',function(){if(Object.keys(S.assignments).length>0){if(!confirm('確定要重新匯入？未儲存的排班資料將遺失。'))return;}showStep(['stepImport']);});
  $('btnReconfig').addEventListener('click',function(){if(Object.keys(S.assignments).length>0){if(!confirm('確定要重新設定？未儲存的排班資料將遺失。'))return;}showStep(['stepImport','stepConfig']);});
  $('btnUploadLastWeek').addEventListener('click',function(){$('lastWeekFile').click();});
  $('lastWeekFile').addEventListener('change',function(){
    var file=$('lastWeekFile').files[0];
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var wb=XLSX.read(e.target.result);
        var ids=parseLastWeekExcel(wb);
        if(ids.length===0)throw new Error('未找到任何學員');
        var prevWeek=S.weekNum-1;
        S.history[prevWeek]={ids:ids};
        var st=$('lastWeekStatus');
        st.textContent='已載入：'+ids.length+' 人（第'+prevWeek+'週）';
        st.className='lastweek-status loaded';
        updateConfigSummary();
        showToast('上週排班表已載入（'+ids.length+' 人）');
      }catch(err){
        $('lastWeekStatus').textContent='載入失敗：'+err.message;
        showToast('載入失敗：'+err.message);
      }
      $('lastWeekFile').value='';
    };
    reader.readAsArrayBuffer(file);
  });
  window.addEventListener('beforeunload',function(e){
    if(S.assignments&&Object.keys(S.assignments).length>0&&!S.savedWeeks.has(S.weekNum)){
      e.preventDefault();e.returnValue='您有未儲存的排班資料，確定要離開嗎？';
    }
  });
  $('btnExport').addEventListener('click',exportExcel);
  $('btnSave').addEventListener('click',saveWeek);
  $('pickerClose').addEventListener('click',closePicker);
  $('pickerModal').addEventListener('click',function(e){if(e.target===$('pickerModal'))closePicker();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closePicker();});
}
document.addEventListener('DOMContentLoaded',init);
</script>
