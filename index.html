<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self'">
<title>92期1隊 半自動勤排系統</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js" integrity="sha384-OUW9euuUyxyHcAhTqbhI+Iyb8LMssXt/cpz0yXhs9UWG2/R/uaWdakx/4cfww7Vb" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js" integrity="sha384-+mbV2IY1Zk/X1p/nWllGySJSUN8uMs+gUAN10Or95UBH0fpj6GfKgPmgC5EXieXG" crossorigin="anonymous"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<video id="bgVideo" autoplay muted loop playsinline></video>
<header>
  <h1>92期1隊 半自動勤排系統<em>114-2</em></h1>
  <span class="ver">v2.4</span>
</header>
<main>
  <section id="stepImport" class="step active">
    <h2><span class="num">1</span> 匯入排班資料</h2>
    <div class="drop-zone" id="dropZone" role="button" tabindex="0" aria-label="拖放或點擊上傳排班資料 Excel 檔案">
      <p>拖放 <strong>排班資料</strong> 到此處</p>
      <p class="hint">或點擊選擇檔案</p>
      <input type="file" id="fileInput" accept=".xlsx,.xls" aria-label="選擇排班資料檔案">
    </div>
    <div id="importStatus"></div>
    <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <button class="btn btn-outline btn-sm" id="btnBackupExport" style="font-size:.82rem;padding:8px 14px">匯出歷史備份</button>
      <button class="btn btn-outline btn-sm" id="btnBackupImport" style="font-size:.82rem;padding:8px 14px">匯入歷史備份</button>
      <input type="file" id="backupFile" accept=".json" style="display:none">
      <span id="backupStatusInfo" style="display:none;font-size:.78rem;color:var(--text-d);margin-left:4px"></span>
    </div>
  </section>
  <section id="stepConfig" class="step">
    <h2><span class="num">2</span> 本週設定</h2>
    <div class="week-row">
      <label>學期起始 <input type="date" id="semesterStart" value="2026-03-02" autocomplete="off" style="font-size:.85rem;padding:4px 6px;border-radius:6px;border:1px solid var(--border-l);background:var(--card);color:var(--text)"></label>
      <label style="margin-left:12px">第 <input type="number" id="weekNum" min="1" max="20" value="1" autocomplete="off"> 週</label>
      <span class="dates" id="weekDates"></span>
    </div>
    <div class="lastweek-upload" id="lastWeekUpload">
      <label class="lastweek-label">上週排班表（可選）</label>
      <div class="lastweek-row">
        <button class="btn btn-outline btn-sm" id="btnUploadLastWeek">上傳上週 Excel</button>
        <input type="file" id="lastWeekFile" accept=".xlsx,.xls" style="display:none">
        <span class="lastweek-status" id="lastWeekStatus">未載入</span>
      </div>
    </div>
    <div class="exclude-section">
      <h3>本週排除學員（請假/公差等）</h3>
      <div style="display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap">
        <div class="exclude-search-wrap">
          <input type="text" class="exclude-search" id="excludeSearch" placeholder="搜尋學號或姓名..." autocomplete="off">
          <div class="exclude-dropdown" id="excludeDropdown"></div>
        </div>
      </div>
      <div class="exclude-list" id="excludeList"></div>
    </div>
    <h3>選擇本週要排的勤務</h3>
    <div class="duty-grid" id="dutyGrid"></div>
    <div class="summary-bar" id="configSummary" style="display:none"></div>
    <div class="btn-row">
      <button class="btn btn-gold" id="btnSchedule" disabled title="請先至少選擇一項勤務">產生勤務表</button>
      <button class="btn btn-outline" id="btnReimport">重新匯入</button>
    </div>
  </section>
  <section id="stepResults" class="step">
    <h2><span class="num">3</span> 排勤結果 <span style="font-size:.8rem;color:var(--text-m);font-weight:400;margin-left:8px">點擊格子可更換人員</span></h2>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="tab-bar" id="resultTabs"></div>
    <div id="resultPanels"></div>
    <div class="btn-row" style="margin-top:18px">
      <button class="btn btn-outline btn-sm" id="btnUndo" disabled title="復原上一步 (Ctrl+Z)">&#x21A9; 復原</button>
      <select class="fill-select" id="fillDutySelect"><option value="">全部勤務</option></select>
      <button class="btn btn-gold" id="btnFillEmpty">隨機填滿空格</button>
      <button class="btn btn-gold" id="btnExport">匯出 Excel</button>
      <button class="btn btn-blue" id="btnSave">儲存本週紀錄</button>
      <button class="btn btn-danger-outline" id="btnReconfig">重新設定</button>
    </div>
  </section>
  <section id="stepDashboard" class="step">
    <h2><span class="num">4</span> 時數總覽</h2>
    <div id="dashboard"></div>
  </section>
</main>
<div class="modal-overlay" id="pickerModal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="pickerTitle">選擇人員</h3>
      <button class="btn-x" id="pickerClose">&times;</button>
    </div>
    <div class="modal-search"><input type="text" id="pickerSearch" placeholder="搜尋學號或姓名..." autocomplete="off"></div>
    <label class="pk-toggle" id="pickerToggle"><input type="checkbox" id="pickerShowAll"><span id="pickerToggleLabel">顯示全部學員（忽略限制）</span></label>
    <div id="pickerClearRow" style="display:none"></div>
    <div id="pickerHolidayRow" style="display:none"></div>
    <div class="picker-list" id="pickerList"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
